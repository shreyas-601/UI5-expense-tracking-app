specVersion: '3.0'
metadata:
  name: com.enterprise.travelexpense
type: application

builder:
  resources:
    excludes:
      - /test-resources/**
      - /resources/sap/ui/core/demokit/**

framework:
  name: OpenUI5
  version: "1.120.1"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.f
    - name: sap.ui.layout
    - name: sap.uxap
    - name: sap.ui.table
    - name: sap.ui.unified
    - name: themelib_sap_horizon

server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /sap/opu/odata
      configuration:
        baseUri: http://localhost:4004
        pathRewrite:
          "^/sap/opu/odata": ""