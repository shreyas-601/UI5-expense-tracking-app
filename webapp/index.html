<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel &amp; Expense Management</title>

    <script
        id="sap-ui-bootstrap"
        src="https://openui5.hana.ondemand.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m,sap.f,sap.ui.layout,sap.uxap,sap.ui.table,sap.ui.unified"
        data-sap-ui-resourceroots='{
            "com.enterprise.travelexpense": "./"
        }'
        data-sap-ui-onInit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted"
        data-sap-ui-xx-waitForTheme="true">
    </script>
</head>
<body class="sapUiBody" id="content">
    <div
        data-sap-ui-component
        data-name="com.enterprise.travelexpense"
        data-id="container"
        data-settings='{"id":"travelExpense"}'
        data-handle-validation="true">
    </div>
</body>
</html>
